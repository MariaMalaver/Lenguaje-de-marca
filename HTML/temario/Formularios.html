<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ejercicio - formulario</title>
    </head>
    <body>
        <h1>FORMULARIOS</h1>
        <form id="ejemplo" action="extructtura.html">
            <input type="text" id="nombreCliente" placeholder="Introduce el nombre"> <!--todos deben de tener un id-->
            <br>
            <input type="password" id="passCliente">
            <br>
            <input type="date" id="fechaCliente">
            <br>
            <input type="color" id="colorCliente">
            <br>
            <input type="email" value="ekekeke">
            <br>
            <input type="range">
            <br>
            <input type="checkbox" checked> <!--el checked para que aparezca ya pinchado-->
            <br>
            <input type="radio">
            <br>
            <input type="submit" value="ACEPTAR">
        </form>
    </body>
</html>
