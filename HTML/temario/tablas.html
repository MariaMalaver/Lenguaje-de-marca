<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TABLAS</title>
    </head>
    <body>
        <table border="1">
            <thead> <!--esto no es para ada solo para agrupar y leerse mejor-->
                <tr>
                    <th>NOMBRE</th>
                    <th>MODULO</th>
                    <th>NOTAS</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Jesus</td>
                    <td>Marcas</td>
                    <td>9</td>
                </tr>
                <tr>
                    <td>Pepe</td>
                    <td>Marcas</td>
                    <td>3</td>
                </tr>
                <tr>
                    <td>Juana</td>
                    <td>Marcas</td>
                    <td>6</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>-</td>
                    <td>Media</td>
                    <td>6</td>
                </tr>
            </tfoot>
            <caption>ALUMNOS</caption> <!--titulo tabla-->
        </table>
        </br>
        <table border="1">
            <thead>
                <tr>
                    <th colspan="2">ROWSPAN Y COLSPAN</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="3">celda1</td>
                    <td>celda2</td>
                </tr>
                <tr>
                    <td>celda3</td>

                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2">final con roswpan</td>
                </tr>
            </tfoot>
            <caption>PRUEBA</caption>
        </table>
    </body>
</html>
